server:
  port: 8080

spring:
  application:
    name: poverty-alleviation
  profiles:
    active: dev

  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/poverty_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowMultiQueries=true
    username: root
    password: YOUR_DB_PASSWORD # 请修改为实际密码

  redis:
    host: localhost
    port: 6379
    database: 0
    timeout: 5000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

  sql:
    init:
      mode: always
      continue-on-error: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.poverty.modules.**.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT 配置
jwt:
  secret: YOUR_JWT_SECRET # 请修改为实际密钥
  expiration: 86400000  # 24 小时，单位毫秒

# Knife4j
knife4j:
  enable: true
  production: false

# 阿里云 OSS 配置
aliyun:
  oss:
    endpoint: oss-cn-hangzhou.aliyuncs.com
    access-key-id: your-access-key-id
    access-key-secret: YOUR_JWT_SECRET # 请修改为实际密钥
    bucket-name: poverty-alleviation-files
    url-prefix: https://poverty-alleviation-files.oss-cn-hangzhou.aliyuncs.com

# MinIO 配置（当使用 MinIO 时）
minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: YOUR_MINIO_SECRET # 请修改为实际密钥
  bucket-name: poverty-files
  url-prefix: http://localhost:9000/poverty-files

# DeepSeek AI 配置
deepseek:
  api-key: YOUR_DEEPSEEK_API_KEY # 请修改为实际密钥
