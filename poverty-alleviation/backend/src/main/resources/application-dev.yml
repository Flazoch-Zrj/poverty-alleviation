spring:
  datasource:
    url: jdbc:mysql://localhost:3306/poverty_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowMultiQueries=true
    username: root
    password: YOUR_DB_PASSWORD # 请修改为实际密码

  sql:
    init:
      mode: always
      continue-on-error: true

  redis:
    host: localhost
    port: 6379
    database: 0
    timeout: 3000ms
    # 开发环境下允许 Redis 连接失败
    lettuce:
      pool:
        max-active: 0
      shutdown-timeout: 100ms

  # 允许 Redis 连接失败（开发环境）
  cache:
    type: none

logging:
  level:
    com.poverty: debug
    org.springframework.security: debug
  file:
    name: logs/poverty-app.log
    max-history: 7
    max-size: 10MB

knife4j:
  enable: true
  production: false

# JWT 配置（开发环境使用固定密钥便于调试）
jwt:
  secret: devSecretKeyForTestingOnly1234567890
  expiration: 86400000
